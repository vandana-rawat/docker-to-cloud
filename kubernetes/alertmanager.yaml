global:
  resolve_timeout: 5m
  slack_api_url: 'https://hooks.slack.com/services/testing'

route:
  receiver: slack-notifications

receivers:
  - name: slack-notifications
    slack_configs:
      - channel: '#alerts'
        send_resolved: true
        title: '{{ .CommonLabels.alertname }}'
        text: '{{ .CommonAnnotations.summary }} - {{ .CommonAnnotations.description }}'
