apiVersion: v1
kind: Pod
metadata:
  name: flask-pod
  labels:
    app: flask
spec:
  containers:
    - name: flask-container
      image: gurjeetkaur0005/web-flask-app:latest
      ports:
        - containerPort: 5000
      env:
        - name: MONGO_HOST
          value: "mongo-service"
        - name: MONGO_PORT
          value: "27017"